<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ana Laura ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

.container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 20px;
}

h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 10vw; /* RESPONSIVO */
  margin: 0;
}

p {
  font-size: 5vw;
}

button {
  margin-top: 20px;
  padding: 15px;
  width: 80%;
  max-width: 300px;
  font-size: 5vw;
  border: none;
  border-radius: 50px;
  background: linear-gradient(45deg, #ff4b5c, #ff758c);
  color: white;
}

#mensagem {
  display: none;
  margin-top: 20px;
  font-size: 5vw;
  line-height: 1.6;
}

.fotos {
  margin-top: 20px;
  display: none;
  grid-template-columns: 1fr;
  gap: 10px;
}

.fotos img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 15px;
}

.contador {
  margin-top: 15px;
  font-size: 4vw;
  display: none;
}

.heart {
  position: fixed;
  color: red;
  animation: fall linear infinite;
}

@keyframes fall {
  0% {top:-10%;opacity:1;}
  100% {top:110%;opacity:0;}
}
</style>
</head>

<body>

<div class="container">
  <h1>Ana Laura ❤️</h1>
  <p>Isso é para você...</p>

  <button onclick="iniciar()">Clique aqui 💌</button>

  <div id="mensagem"></div>

  <div class="contador" id="contador"></div>

  <div class="fotos">
    <img src="img/foto1.jpg.jpeg">
    <img src="img/foto2.jpg.jpeg">
  </div>
</div>

<iframe id="player" width="0" height="0"
src="https://youtu.be/ZFlpVBFSEis?si=uuKDWpibJWzOrCAA"
frameborder="0"
allow="autoplay">
</iframe>

<script>
const texto = `Amorzinho...

Eu poderia escrever mil coisas aqui...
mas nenhuma seria suficiente pra explicar o que eu sinto por você.

Você chegou de um jeito tão especial,
e sem perceber...
se tornou tudo pra mim.

Seu sorriso muda meu dia.
Sua voz me acalma.
Seu jeito me prende.

E no meio de tantas pessoas no mundo...
foi você quem fez meu coração escolher ficar.

Eu quero estar com você nos dias bons,
nos dias difíceis,
e em todos os momentos que ainda vamos viver.

Eu te amo mais do que palavras conseguem dizer ❤️`;

let i = 0;

function iniciar() {
  document.querySelector("button").style.display = "none";
  document.getElementById("mensagem").style.display = "block";
  document.querySelector(".fotos").style.display = "block";
  document.getElementById("contador").style.display = "block";

  escrever();
  atualizarTempo();
}

function escrever() {
  if (i < texto.length) {
    document.getElementById("mensagem").innerHTML += texto.charAt(i);
    i++;
    setTimeout(escrever, 35);
  }
}

// DATA QUE VOCÊS COMEÇARAM (MUDA AQUI)
const dataInicio = new Date("2025-08-16");

function atualizarTempo() {
  const agora = new Date();
  const diff = agora - dataInicio;

  const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
  const horas = Math.floor(diff / (1000 * 60 * 60)) % 24;

  document.getElementById("contador").innerHTML =
    `Estamos juntos há ${dias} dias e ${horas} horas ❤️`;

  setTimeout(atualizarTempo, 1000);
}

function criarCoracao() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}

setInterval(criarCoracao, 200);
</script>

</body>
</html>
